<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerome.</title>
  <link rel="icon" href="./src/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f7;
      --text: #111;
      --muted: #999;
      --border: #e5e5e0;
      --link-underline: #bbb;
    }

    html.dark {
      --bg: #111;
      --text: #e8e8e6;
      --muted: #555;
      --border: #252525;
      --link-underline: #444;
    }

    /* muted tag colors for dark mode */
    html.dark .t-green  { color: #68b088; }
    html.dark .t-blue   { color: #6ba3d6; }
    html.dark .t-amber  { color: #c49a4a; }
    html.dark .t-purple { color: #9f82d4; }
    html.dark .t-red    { color: #c47070; }
    html.dark .t-gray   { color: #666; }
    html.dark .t-teal   { color: #5aabac; }
    html.dark .t-pink   { color: #c47094; }
    html.dark .t-indigo { color: #7b8fd4; }

    html.dark nav {
      background: rgba(17, 17, 17, 0.72);
      border-bottom-color: rgba(37, 37, 37, 0.6);
    }

    html.dark .filter-btn.active {
      background: #2a2a2a;
      border-color: #e8e8e6;
      color: #e8e8e6;
    }

    html.dark .timeline-row:hover {
      background: rgba(255,255,255,0.03);
    }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    body { min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(249, 249, 247, 0.72);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid rgba(229, 229, 224, 0.6);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    @media (max-width: 540px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 12px; }
      .nav-links .hide-mobile { display: none; }
      .dark-toggle { margin-left: 4px; padding: 4px 8px; }
    }

    .dark-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      margin-left: 16px;
    }
    .dark-toggle:hover { color: var(--text); border-color: var(--text); }

    /* ── PAGE ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 120px;
    }

    .page-header { margin-bottom: 48px; }

    .page-header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 400px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    .stats-bar span b {
      font-weight: 600;
      color: var(--text);
    }

    /* ── FILTER TABS ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ── TIMELINE LIST ── */
    .timeline {
      width: 100%;
    }

    .timeline-header {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .timeline-header span {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Year group header — sits above its events, not inside a row */
    .year-group-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 20px 0 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .year-group-header.hidden { display: none; }

    .year-num {
      display: inline-block;
      min-width: 32px;
      font-variant-numeric: tabular-nums;
    }

    .year-sep {
      color: var(--border);
      font-size: 10px;
    }

    .row-year-phase {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 0 20px;
      border-bottom: 1px solid var(--border);
      padding: 9px 0;
      transition: background 0.1s;
    }

    .timeline-row:hover {
      background: rgba(0,0,0,0.02);
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }

    .timeline-row.hidden { display: none; }

    .phase-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* tag colors */
    .t-green  { color: #2d7a4f; }
    .t-blue   { color: #2b6cb0; }
    .t-amber  { color: #b7791f; }
    .t-purple { color: #6b46c1; }
    .t-red    { color: #c53030; }
    .t-gray   { color: #999; }
    .t-teal   { color: #2c7a7b; }
    .t-pink   { color: #97266d; }
    .t-indigo { color: #3c366b; }

    .row-event {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
    }

    .row-event a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 2px;
    }

    .row-event a:hover {
      text-decoration-color: var(--text);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 2px;
    }

    footer a:hover { color: var(--text); }

    /* ── MOBILE ── */
    @media (max-width: 520px) {
      .timeline-header,
      .timeline-row {
        grid-template-columns: 64px 1fr;
        gap: 0 16px;
      }

      .row-year { font-size: 12px; }
      .row-event { font-size: 13px; }

      nav { padding: 0 16px; }
      .page { padding: 36px 16px 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">Jerome.</a>
    <ul class="nav-links">
      <li class="hide-mobile"><a href="https://twitter.com/tsejerome" target="_blank">X</a></li>
      <li class="hide-mobile"><a href="https://linkedin.com/in/tse-jerome" target="_blank">IN</a></li>
      <li class="hide-mobile"><a href="https://jupitrr.com" target="_blank">Jupitrr</a></li>
      <li class="hide-mobile"><a href="legacy/#socials">Socials</a></li>
      <li><a href="inspirations">Inspirations</a></li>
      <li><button class="dark-toggle" id="dark-toggle">Dark</button></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Life Timeline</h1>
      <p>Everything that happened — builder, founder, dropout-who-didn't-drop-out, and everything in between.</p>
      <div class="stats-bar" id="stats-bar"></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Reborn">Reborn</button>
      <button class="filter-btn" data-filter="Grind">Grind</button>
      <button class="filter-btn" data-filter="Learn">Learn</button>
      <button class="filter-btn" data-filter="Restart">Restart</button>
      <button class="filter-btn" data-filter="Break">Break</button>
      <button class="filter-btn" data-filter="Pivot">Pivot</button>
      <button class="filter-btn" data-filter="Scale">Scale</button>
      <button class="filter-btn" data-filter="Manifestation">Manifestation</button>
      <button class="filter-btn" data-filter="Foundation">Foundation</button>
      <button class="filter-btn" data-filter="Experiment">Experiment</button>
      <button class="filter-btn" data-filter="Explore">Explore</button>
      <button class="filter-btn" data-filter="Origins">Origins</button>
    </div>

    <div class="timeline-header">
      <span>Year</span>
      <span>Event</span>
    </div>

    <div class="timeline" id="timeline-body">
      <!-- rendered by JS -->
    </div><!-- /timeline -->
  </div><!-- /page -->

  <footer>
    <span>© 2025 <a href="/">Jerome Tse</a></span>
    <span id="hk-time"></span>
  </footer>

  <script>
    // ── TIMELINE DATA ────────────────────────────────────────────────
    // Each entry: { year, yearLabel?, phase, tag, color, event, link? }
    // color: t-green | t-blue | t-amber | t-purple | t-red | t-gray | t-teal | t-pink | t-indigo
    const timeline = [
      { year: 2026, phase: 'Reborn',        tag: 'Milestone', color: 't-green',  event: 'Jupitrr reaches 170k users',                             link: 'https://jupitrr.com' },
      { year: 2026, phase: 'Reborn',        tag: 'AI',        color: 't-purple', event: 'Early user of OpenClaw' },
      { year: 2026, phase: 'Reborn',        tag: 'AI',        color: 't-purple', event: 'Scaling Video OS + AI agents' },

      { year: 2025, phase: 'Grind',         tag: 'Milestone', color: 't-green',  event: 'Jupitrr hits 100k users',                                link: 'https://jupitrr.com' },
      { year: 2025, phase: 'Grind',         tag: 'AI',        color: 't-purple', event: 'Builds AI video agent Levio',                            link: 'https://jupitrr.com/levio' },
      { year: 2025, phase: 'Grind',         tag: 'AI',        color: 't-purple', event: 'AI native — 15+ people\'s output with a 3-person team (Claude + Whisper + OpenClaw)' },
      { year: 2025, phase: 'Grind',         tag: 'Tooling',   color: 't-teal',   event: 'Scales with Claude Code' },
      { year: 2025, phase: 'Grind',         tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Day',                      link: 'https://www.producthunt.com/products/jupitrr' },
      { year: 2025, phase: 'Grind',         tag: 'Health',    color: 't-pink',   event: 'Chest press 60kg × 15' },
      { year: 2025, phase: 'Grind',         tag: 'Health',    color: 't-pink',   event: '75 Soft Challenge',                                      link: 'https://andyfrisella.com/pages/75hard' },
      { year: 2025, phase: 'Grind',         tag: 'Side Hustle', color: 't-gray', event: 'Built voicerecorder.ai + worksheet-genie.com — no founder product fit' },
      { year: 2025, phase: 'Grind',         tag: 'Revenue',   color: 't-amber',  event: 'Built torontoeventsweekly.ca — 1 hr/week, stable $500 MRR', link: 'https://torontoeventsweekly.ca' },

      { year: 2024, phase: 'Learn',         tag: 'Pivot',     color: 't-blue',   event: 'Jupitrr pivots to video sharing tools for social media' },
      { year: 2024, phase: 'Learn',         tag: 'Tooling',   color: 't-teal',   event: 'Early user of Cursor + Devin' },
      { year: 2024, phase: 'Learn',         tag: 'Network',   color: 't-indigo', event: 'SF trip — meets YC founders' },
      { year: 2024, phase: 'Learn',         tag: 'Failed',    color: 't-red',    event: 'Rejected by YC for the 10th time — with 5+ referrals' },
      { year: 2024, phase: 'Learn',         tag: 'Revenue',   color: 't-amber',  event: 'AppSumo deal generates $300k+ overnight' },
      { year: 2024, phase: 'Learn',         tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Week + Day',               link: 'https://www.producthunt.com/products/jupitrr' },
      { year: 2024, phase: 'Learn',         tag: 'Health',    color: 't-pink',   event: '75 Hard Challenge',                                      link: 'https://andyfrisella.com/pages/75hard' },

      { year: 2023, phase: 'Restart',       tag: 'Pivot',     color: 't-blue',   event: 'Jupitrr pivots to social sharing platform' },
      { year: 2023, phase: 'Restart',       tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Day',                      link: 'https://www.producthunt.com/products/jupitrr' },
      { year: 2023, phase: 'Restart',       tag: 'Tooling',   color: 't-teal',   event: 'Early user of ChatGPT 3.5' },
      { year: 2023, phase: 'Restart',       tag: 'Health',    color: 't-pink',   event: 'Starts going to the gym' },

      { year: 2022, phase: 'Break',         tag: 'Moved',     color: 't-gray',   event: 'Moves to Canada' },
      { year: 2022, phase: 'Break',         tag: 'Passive',   color: 't-green',  event: 'Freehunter becomes passive income',                      link: 'https://freehunter.hk' },
      { year: 2022, phase: 'Break',         tag: 'Burnout',   color: 't-gray',   event: 'Jupitrr becomes part-time due to burnout' },

      { year: 2021, phase: 'Pivot',         tag: 'M&A',       color: 't-amber',  event: 'M&A offer received — SPA drafted, acquirer drags review period so that our cashflow burns to lowball us on negotiation' },
      { year: 2021, phase: 'Pivot',         tag: 'Milestone', color: 't-green',  event: 'Freehunter hits $30M+ transaction volume' },
      { year: 2021, phase: 'Pivot',         tag: 'Grad',      color: 't-indigo', event: 'Graduates from The University of Hong Kong',             link: 'https://www.hku.hk' },
      { year: 2021, phase: 'Pivot',         tag: 'Shutdown',  color: 't-red',    event: 'Shuts down the team' },
      { year: 2021, phase: 'Pivot',         tag: 'Founded',   color: 't-green',  event: 'Jupitrr first idea — tinder for business, challenging revenue model' },

      { year: 2020, phase: 'Scale',         tag: 'Milestone', color: 't-green',  event: 'Freehunter hits 100k users — HK market leader, registered user count is 1.5% of HK\'s population', link: 'https://freehunter.hk' },
      { year: 2020, phase: 'Scale',         tag: 'Expansion', color: 't-blue',   event: 'Expands to Taiwan, pivots back to freelance job matching platform' },
      { year: 2020, phase: 'Scale',         tag: 'Personal',  color: 't-gray',   event: 'Tried getting long hair' },

      { year: 2019, phase: 'Manifestation', tag: 'Award',     color: 't-amber',  event: 'Named 30 Under 30 Hong Kong' },
      { year: 2019, phase: 'Manifestation', tag: 'Failed',    color: 't-red',    event: 'Builds LinkedIn for creatives — high engagement, cashflow issues, shuts down' },
      { year: 2019, phase: 'Manifestation', tag: 'Expert',    color: 't-teal',   event: 'Ranked #1 on 100+ top keywords like \'freelance Hong Kong\'' },
      { year: 2019, phase: 'Manifestation', tag: 'Team',      color: 't-amber',  event: '10+ employees — rents an office' },

      { year: 2018, phase: 'Foundation',    tag: 'Founding',  color: 't-amber',  event: 'Met <a href="https://linkedin.com/in/harrischh" target="_blank">Harris</a> and <a href="https://www.linkedin.com/in/leetszhoi/" target="_blank">Lee</a> — cofound Freehunter.hk' },
      { year: 2018, phase: 'Foundation',    tag: 'Funding',   color: 't-green',  event: 'Raises angel funding from listed company HR directors' },
      { year: 2018, phase: 'Foundation',    tag: 'Speaking',  color: 't-blue',   event: 'One of the youngest guest lecturers at HKU' },

      { year: 2017, phase: 'Experiment',    tag: 'Gap',       color: 't-gray',   event: 'Takes a gap semester' },
      { year: 2017, phase: 'Experiment',    tag: 'Failed',    color: 't-red',    event: 'Launches an online hackerspace — fails' },
      { year: 2017, phase: 'Experiment',    tag: 'Failed',    color: 't-red',    event: 'Tried building with different cofounders — startup fails (founder conflicts)' },

      { year: 2016, phase: 'Explore',       tag: 'Offer',     color: 't-gray',   event: 'Receives offers from <a href="https://en.wikipedia.org/wiki/Wingz_(company)" target="_blank">Wingz</a> + Wells Fargo' },
      { year: 2016, phase: 'Explore',       tag: 'Failed',    color: 't-red',    event: 'Joins a Shanghai startup instead — it shuts down' },

      { year: 2015, phase: 'Origins',       tag: 'Business',  color: 't-amber',  event: 'First biz — CNY toy business, fundraised from family, breaks even' },
      { year: 2015, phase: 'Origins',       tag: 'Education', color: 't-indigo', event: 'Enters The University of Hong Kong',                     link: 'https://www.hku.hk' },

      { year: 2004, phase: 'Origins',       tag: 'Piano',     color: 't-pink',   event: 'Achieves Piano Grade 8',                                 yearLabel: '2004–14' },
      { year: 2004, phase: 'Origins',       tag: 'Code',      color: 't-teal',   event: 'Builds first PHP website — fails, but ships it' },
      { year: 2004, phase: 'Origins',       tag: 'Gaming',    color: 't-green',  event: 'Plays Minecraft beta' },
      { year: 2004, phase: 'Origins',       tag: 'Community', color: 't-teal',   event: 'Runs own minecraft game server (Hamachi + Bukkit)' },
      { year: 2004, phase: 'Origins',       tag: 'Community', color: 't-teal',   event: 'Admin of a major CS 1.6 server in Hong Kong' },
      { year: 2004, phase: 'Origins',       tag: 'Piano',     color: 't-pink',   event: 'Learns piano' },

      { year: 1997, phase: 'Origins',       tag: 'Born',      color: 't-gray',   event: 'Born in Canada' },
    ];

    // ── PHASE COLOR MAP ──────────────────────────────────────────────
    const phaseColor = {
      Origins:       't-indigo',
      Explore:       't-teal',
      Experiment:    't-gray',
      Foundation:    't-amber',
      Manifestation: 't-purple',
      Scale:         't-green',
      Pivot:         't-purple',
      Break:         't-gray',
      Restart:       't-blue',
      Learn:         't-indigo',
      Grind:         't-red',
      Reborn:        't-green',
    };

    // ── RENDER ───────────────────────────────────────────────────────
    function render(filter) {
      const body = document.getElementById('timeline-body');
      const visible = filter === 'all' ? timeline : timeline.filter(e => e.phase === filter);

      const seenYears = new Set();
      body.innerHTML = visible.map(entry => {
        const isFirst = !seenYears.has(entry.year);
        seenYears.add(entry.year);
        const eventHTML = entry.link
          ? `<a href="${entry.link}" target="_blank">${entry.event}</a>`
          : entry.event;
        const header = isFirst ? `
      <div class="year-group-header" data-phase="${entry.phase}">
        <span class="year-num">${entry.yearLabel || entry.year}</span>
        <span class="year-sep">•</span>
        <span class="row-year-phase ${phaseColor[entry.phase]}">${entry.phase}</span>
      </div>` : '';
        return header + `
      <div class="timeline-row" data-phase="${entry.phase}" data-year="${entry.year}">
        <div></div>
        <div class="row-event">${eventHTML}</div>
      </div>`;
      }).join('');
    }

    // ── STATS BAR ────────────────────────────────────────────────────
    const totalEvents = timeline.length;
    const totalYears  = new Date().getFullYear() - 1997;
    const totalPhases = new Set(timeline.map(e => e.phase)).size;
    document.getElementById('stats-bar').innerHTML =
      `<span><b>${totalEvents}</b> events</span>` +
      `<span><b>${totalYears}</b> years</span>` +
      `<span><b>${totalPhases}</b> phases</span>`;

    render('all');

    // ── FILTERS ──────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.filter);
      });
    });

    // ── DARK MODE ────────────────────────────────────────────────────
    const toggle = document.getElementById('dark-toggle');
    const isDark = () => document.documentElement.classList.contains('dark');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      toggle.textContent = isDark() ? 'Light' : 'Dark';
    });

    // ── HK CLOCK ─────────────────────────────────────────────────────
    function updateHKTime() {
      const hk = new Intl.DateTimeFormat('en-HK', {
        timeZone: 'Asia/Hong_Kong',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(new Date());
      document.getElementById('hk-time').textContent = 'HK Time: ' + hk;
    }
    updateHKTime();
    setInterval(updateHKTime, 1000);
  </script>

</body>
</html>
