<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerome. — Life</title>
  <link rel="icon" href="./src/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f7;
      --text: #111;
      --muted: #999;
      --border: #e5e5e0;
      --link-underline: #bbb;
    }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    body { min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── PAGE ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 120px;
    }

    .page-header { margin-bottom: 48px; }

    .page-header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 400px;
    }

    /* ── FILTER TABS ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ── TIMELINE LIST ── */
    .timeline {
      width: 100%;
    }

    .timeline-header {
      display: grid;
      grid-template-columns: 56px 108px 1fr;
      gap: 0 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .timeline-header span {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 56px 108px 1fr;
      gap: 0 24px;
      border-bottom: 1px solid var(--border);
      padding: 11px 0;
      transition: background 0.1s;
    }

    .timeline-row:hover {
      background: rgba(0,0,0,0.02);
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }

    .timeline-row.hidden { display: none; }

    /* Year group separator — shows year once per group */
    .timeline-row.year-start .row-year {
      color: var(--text);
      font-weight: 500;
    }

    .row-year {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      white-space: nowrap;
      padding-top: 1px;
      line-height: 1.5;
    }

    .row-phase {
      display: flex;
      align-items: flex-start;
      padding-top: 1px;
    }

    .phase-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

        /* tag colors */
    .t-green  { border-color: #c3e6cb; color: #2d7a4f; background: #f0faf4; }
    .t-blue   { border-color: #bee3f8; color: #2b6cb0; background: #ebf8ff; }
    .t-amber  { border-color: #fbd38d; color: #b7791f; background: #fffaf0; }
    .t-purple { border-color: #e9d8fd; color: #6b46c1; background: #faf5ff; }
    .t-red    { border-color: #fed7d7; color: #c53030; background: #fff5f5; }
    .t-gray   { border-color: #e2e8f0; color: #4a5568; background: #f7fafc; }
    .t-teal   { border-color: #b2f5ea; color: #2c7a7b; background: #e6fffa; }
    .t-pink   { border-color: #fed7e2; color: #97266d; background: #fff5f7; }
    .t-indigo { border-color: #c3dafe; color: #3c366b; background: #ebf4ff; }

    .row-event {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
    }

    .row-event a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 2px;
    }

    .row-event a:hover {
      text-decoration-color: var(--text);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 2px;
    }

    footer a:hover { color: var(--text); }

    /* ── MOBILE ── */
    @media (max-width: 520px) {
      .timeline-header,
      .timeline-row {
        grid-template-columns: 44px 1fr;
        gap: 0 20px;
      }

      .timeline-header span:nth-child(2),
      .row-phase { display: none; }

      .row-year { font-size: 12px; }
      .row-event { font-size: 13px; }

      nav { padding: 0 16px; }
      .page { padding: 36px 16px 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="..">Jerome.</a>
    <ul class="nav-links">
      <li><a href="https://twitter.com/tsejerome" target="_blank">X</a></li>
      <li><a href="https://linkedin.com/in/tse-jerome" target="_blank">IN</a></li>
      <li><a href="https://jupitrr.com" target="_blank">Jupitrr</a></li>
      <li><a href="../#socials">Socials</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Life Timeline</h1>
      <p>Everything that happened — builder, founder, dropout-who-didn't-drop-out, and everything in between.</p>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Scale">Scale</button>
      <button class="filter-btn" data-filter="Growth">Growth</button>
      <button class="filter-btn" data-filter="Breakout">Breakout</button>
      <button class="filter-btn" data-filter="Pivot">Pivot</button>
      <button class="filter-btn" data-filter="Momentum">Momentum</button>
      <button class="filter-btn" data-filter="Experiment">Experiment</button>
      <button class="filter-btn" data-filter="Origins">Origins</button>
    </div>

    <div class="timeline-header">
      <span>Year</span>
      <span>Phase</span>
      <span>Event</span>
    </div>

    <div class="timeline" id="timeline-body">
      <!-- rendered by JS -->
    </div><!-- /timeline -->
  </div><!-- /page -->

  <footer>
    <span>© 2025 <a href="..">Jerome Tse</a></span>
    <span id="hk-time"></span>
  </footer>

  <script>
    // ── TIMELINE DATA ────────────────────────────────────────────────
    // Each entry: { year, yearLabel?, phase, tag, color, event, link? }
    // color: t-green | t-blue | t-amber | t-purple | t-red | t-gray | t-teal | t-pink | t-indigo
    const timeline = [
      { year: 2026, phase: 'Scale',      tag: 'Milestone', color: 't-green',  event: 'Jupitrr reaches 170k users',                       link: 'https://jupitrr.com' },
      { year: 2026, phase: 'Scale',      tag: 'AI',        color: 't-purple', event: 'Scaling Video OS + AI agents' },

      { year: 2025, phase: 'Growth',     tag: 'Milestone', color: 't-green',  event: 'Jupitrr hits 100k users',                          link: 'https://jupitrr.com' },
      { year: 2025, phase: 'Growth',     tag: 'AI',        color: 't-purple', event: 'Builds AI video agent' },
      { year: 2025, phase: 'Growth',     tag: 'Tooling',   color: 't-teal',   event: 'Scales with Claude Code' },
      { year: 2025, phase: 'Growth',     tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Day' },

      { year: 2024, phase: 'Growth',     tag: 'Tooling',   color: 't-teal',   event: 'Early user of Cursor + Devin' },
      { year: 2024, phase: 'Growth',     tag: 'Network',   color: 't-indigo', event: 'SF trip — meets YC founders' },
      { year: 2024, phase: 'Growth',     tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Week + Day' },

      { year: 2023, phase: 'Breakout',   tag: 'Revenue',   color: 't-amber',  event: 'AppSumo deal generates $100k+ overnight' },
      { year: 2023, phase: 'Breakout',   tag: 'Launch',    color: 't-blue',   event: 'Product Hunt — Product of the Day (2×)' },
      { year: 2023, phase: 'Breakout',   tag: 'Health',    color: 't-pink',   event: 'Starts going to the gym' },

      { year: 2022, phase: 'Scale',      tag: 'Passive',   color: 't-green',  event: 'Freehunter becomes passive income',                link: 'https://freehunter.io' },
      { year: 2022, phase: 'Scale',      tag: 'Burnout',   color: 't-gray',   event: 'Burnout — slower life' },
      { year: 2022, phase: 'Scale',      tag: 'Building',  color: 't-amber',  event: 'Continues building Jupitrr',                       link: 'https://jupitrr.com' },

      { year: 2021, phase: 'Pivot',      tag: 'Grad',      color: 't-indigo', event: 'Graduates from The University of Hong Kong',       link: 'https://www.hku.hk' },
      { year: 2021, phase: 'Pivot',      tag: 'Moved',     color: 't-gray',   event: 'Moves to Canada' },
      { year: 2021, phase: 'Pivot',      tag: 'Shutdown',  color: 't-red',    event: 'Shuts down the team' },
      { year: 2021, phase: 'Pivot',      tag: 'Founded',   color: 't-green',  event: 'Starts Jupitrr',                                   link: 'https://jupitrr.com' },

      { year: 2020, phase: 'Scale',      tag: 'Milestone', color: 't-green',  event: 'Freehunter hits 100k users',                       link: 'https://freehunter.io' },
      { year: 2020, phase: 'Scale',      tag: 'Growth',    color: 't-blue',   event: 'Continues growing through the pandemic' },

      { year: 2019, phase: 'Momentum',   tag: 'Award',     color: 't-amber',  event: 'Named 30 Under 30 Hong Kong' },
      { year: 2019, phase: 'Momentum',   tag: 'Expert',    color: 't-teal',   event: 'SEO expert — widely known in the industry' },
      { year: 2019, phase: 'Momentum',   tag: 'Team',      color: 't-amber',  event: '10+ employees — rents an office' },

      { year: 2018, phase: 'Momentum',   tag: 'Funding',   color: 't-green',  event: 'Raises angel funding' },
      { year: 2018, phase: 'Momentum',   tag: 'Speaking',  color: 't-blue',   event: 'Guest lecturer at HKU',                            link: 'https://www.hku.hk' },
      { year: 2018, phase: 'Momentum',   tag: 'Funding',   color: 't-green',  event: 'Raises from listed company HR directors' },

      { year: 2017, phase: 'Experiment', tag: 'Gap',       color: 't-gray',   event: 'Takes a gap semester' },
      { year: 2017, phase: 'Experiment', tag: 'Community', color: 't-teal',   event: 'Joins a hackerspace' },
      { year: 2017, phase: 'Experiment', tag: 'Failed',    color: 't-red',    event: 'Multiple cofounders — startup fails (no funding model)' },

      { year: 2016, phase: 'Experiment', tag: 'Offer',     color: 't-gray',   event: 'Receives offers from Wingz + Wells Fargo' },
      { year: 2016, phase: 'Experiment', tag: 'Failed',    color: 't-red',    event: 'Joins a Shanghai startup instead — it shuts down' },

      { year: 2015, phase: 'Origins',    tag: 'Business',  color: 't-amber',  event: 'CNY toy business — $4k raised, breaks even' },
      { year: 2015, phase: 'Origins',    tag: 'Education', color: 't-indigo', event: 'Enters The University of Hong Kong',               link: 'https://www.hku.hk' },

      { year: 2014, phase: 'Origins',    tag: 'Piano',     color: 't-pink',   event: 'Achieves Piano Grade 8' },

      { year: 2012, phase: 'Origins',    tag: 'Code',      color: 't-teal',   event: 'Builds first PHP website — fails, but ships it' },

      { year: 2010, phase: 'Origins',    tag: 'Gaming',    color: 't-green',  event: 'Plays Minecraft beta' },
      { year: 2010, phase: 'Origins',    tag: 'Community', color: 't-teal',   event: 'Runs own game server (Hamachi + Bukkit)' },

      { year: 2009, phase: 'Origins',    tag: 'Community', color: 't-teal',   event: 'Admin of a major CS 1.6 server in Hong Kong' },

      { year: 2004, phase: 'Origins',    tag: 'Piano',     color: 't-pink',   event: 'Learns piano', yearLabel: '2004–07' },

      { year: 1997, phase: 'Origins',    tag: 'Born',      color: 't-gray',   event: 'Born in Canada' },
    ];

    // ── RENDER ───────────────────────────────────────────────────────
    function render(filter) {
      const body = document.getElementById('timeline-body');
      const visible = filter === 'all' ? timeline : timeline.filter(e => e.phase === filter);

      const seenYears = new Set();
      body.innerHTML = visible.map(entry => {
        const isFirst = !seenYears.has(entry.year);
        seenYears.add(entry.year);
        const yearLabel = isFirst ? (entry.yearLabel || entry.year) : '';
        const eventHTML = entry.link
          ? `<a href="${entry.link}" target="_blank">${entry.event}</a>`
          : entry.event;
        return `
      <div class="timeline-row${isFirst ? ' year-start' : ''}" data-phase="${entry.phase}" data-year="${entry.year}">
        <div class="row-year">${yearLabel}</div>
        <div class="row-phase"><span class="phase-tag ${entry.color}">${entry.tag}</span></div>
        <div class="row-event">${eventHTML}</div>
      </div>`;
      }).join('');
    }

    render('all');

    // ── FILTERS ──────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.filter);
      });
    });

    // ── HK CLOCK ─────────────────────────────────────────────────────
    function updateHKTime() {
      const hk = new Intl.DateTimeFormat('en-HK', {
        timeZone: 'Asia/Hong_Kong',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(new Date());
      document.getElementById('hk-time').textContent = 'HK Time: ' + hk;
    }
    updateHKTime();
    setInterval(updateHKTime, 1000);
  </script>

</body>
</html>
