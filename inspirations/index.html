<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerome. — Inspirations</title>
  <link rel="icon" href="../src/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f7;
      --text: #111;
      --muted: #999;
      --border: #e5e5e0;
      --card-bg: #fff;
      --link-underline: #bbb;
    }

    html.dark {
      --bg: #111;
      --text: #e8e8e6;
      --muted: #555;
      --border: #252525;
      --card-bg: #161616;
      --link-underline: #444;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .back-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    #dark-toggle {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    #dark-toggle:hover { color: var(--text); border-color: var(--text); }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .person-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      background: var(--card-bg);
      transition: border-color 0.15s;
    }
    .person-card:hover { border-color: var(--text); }

    .person-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .person-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .person-handle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .person-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--border);
      color: var(--muted);
    }

    .tag.lifestyle { background: #e8f5ee; color: #2d7a4f; }
    .tag.business  { background: #e8f0fb; color: #2b6cb0; }
    .tag.philosophy { background: #f3eeff; color: #6b46c1; }
    .tag.health    { background: #fde8f5; color: #97266d; }
    .tag.writing   { background: #fff4e0; color: #b7791f; }
    .tag.indie     { background: #e8faf9; color: #2c7a7b; }

    html.dark .tag.lifestyle  { background: #1a2e23; color: #68b088; }
    html.dark .tag.business   { background: #1a2535; color: #6ba3d6; }
    html.dark .tag.philosophy { background: #22183a; color: #9f82d4; }
    html.dark .tag.health     { background: #2e1a25; color: #c47094; }
    html.dark .tag.writing    { background: #2e2315; color: #c49a4a; }
    html.dark .tag.indie      { background: #152525; color: #5aabac; }

    .person-quote {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 12px;
      margin: 14px 0;
      line-height: 1.7;
    }

    .person-takeaway {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .person-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .person-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--link-underline);
      padding-bottom: 1px;
      transition: color 0.1s;
    }
    .person-links a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-nav">
      <a class="back-link" href="../">&larr; Jerome Tse</a>
      <button id="dark-toggle">Dark</button>
    </div>

    <h1>Inspirations</h1>
    <p class="subtitle">People whose thinking has shaped how I work and live.</p>

    <div id="cards"></div>
  </div>

  <script>
    const people = [
      {
        name: 'Pieter Levels',
        handle: '@levelsio',
        tags: ['indie', 'lifestyle', 'health', 'business'],
        quote: 'Make money, not art.',
        takeaway: "Pieter showed me that you can build profitable products solo, travel the world, stay healthy, and not burn out doing it. The balance he strikes between shipping things that work, living well, and keeping a small team is exactly the kind of life I'm optimizing for.",
        links: [
          { label: 'x.com/levelsio', url: 'https://x.com/levelsio' },
          { label: 'levels.io', url: 'https://levels.io' },
        ],
      },
      {
        name: 'Naval Ravikant',
        handle: '@naval',
        tags: ['philosophy', 'writing', 'business'],
        quote: 'Wealth is assets that earn while you sleep.',
        takeaway: "Naval's book and tweetstorms changed how I think about wealth, leverage, and self-knowledge. His ideas on specific knowledge, productizing yourself, and finding inner peace gave me a framework I keep returning to — especially during the hard years of building.",
        links: [
          { label: 'x.com/naval', url: 'https://x.com/naval' },
          { label: 'navalmanack.com', url: 'https://www.navalmanack.com' },
        ],
      },
    ];

    const tagClasses = {
      indie: 'indie', lifestyle: 'lifestyle', health: 'health',
      business: 'business', philosophy: 'philosophy', writing: 'writing',
    };

    document.getElementById('cards').innerHTML = people.map(p => `
      <div class="person-card">
        <div class="person-header">
          <div>
            <div class="person-name">${p.name}</div>
            <div class="person-handle">${p.handle}</div>
          </div>
          <div class="person-tags">
            ${p.tags.map(t => `<span class="tag ${tagClasses[t] || ''}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="person-quote">"${p.quote}"</div>
        <div class="person-takeaway">${p.takeaway}</div>
        <div class="person-links">
          ${p.links.map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}
        </div>
      </div>
    `).join('');

    const toggle = document.getElementById('dark-toggle');
    const isDark = () => document.documentElement.classList.contains('dark');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      toggle.textContent = isDark() ? 'Light' : 'Dark';
    });
  </script>
</body>
</html>
