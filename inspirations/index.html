<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerome. — Inspirations</title>
  <link rel="icon" href="../src/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f7;
      --text: #111;
      --muted: #999;
      --border: #e5e5e0;
      --card-bg: #fff;
      --link-underline: #bbb;
    }

    html.dark {
      --bg: #111;
      --text: #e8e8e6;
      --muted: #555;
      --border: #252525;
      --card-bg: #161616;
      --link-underline: #444;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .back-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    #dark-toggle {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    #dark-toggle:hover { color: var(--text); border-color: var(--text); }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .tab-btn {
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 16px 9px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.1s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .person-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
      background: var(--card-bg);
      transition: border-color 0.15s;
    }
    .person-card:hover { border-color: var(--text); }

    .card-image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--border);
      position: relative;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(100%);
      transition: filter 0.3s;
    }
    .person-card:hover .card-image { filter: grayscale(75%); }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .card-body {
      padding: 20px 24px 24px;
    }

    .person-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .person-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .person-handle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .person-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
      justify-content: flex-end;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--border);
      color: var(--muted);
    }

    .tag.lifestyle  { background: #e8f5ee; color: #2d7a4f; }
    .tag.business   { background: #e8f0fb; color: #2b6cb0; }
    .tag.philosophy { background: #f3eeff; color: #6b46c1; }
    .tag.health     { background: #fde8f5; color: #97266d; }
    .tag.writing    { background: #fff4e0; color: #b7791f; }
    .tag.indie      { background: #e8faf9; color: #2c7a7b; }
    .tag.resilience { background: #fff0e8; color: #c05621; }
    .tag.hope       { background: #ebf8ff; color: #2b6cb0; }
    .tag.science    { background: #e8faf9; color: #2c7a7b; }
    .tag.fiction    { background: #f3eeff; color: #6b46c1; }

    html.dark .tag.lifestyle  { background: #1a2e23; color: #68b088; }
    html.dark .tag.business   { background: #1a2535; color: #6ba3d6; }
    html.dark .tag.philosophy { background: #22183a; color: #9f82d4; }
    html.dark .tag.health     { background: #2e1a25; color: #c47094; }
    html.dark .tag.writing    { background: #2e2315; color: #c49a4a; }
    html.dark .tag.indie      { background: #152525; color: #5aabac; }
    html.dark .tag.resilience { background: #2e1e10; color: #d4895a; }
    html.dark .tag.hope       { background: #101e2e; color: #6ba3d6; }
    html.dark .tag.science    { background: #152525; color: #5aabac; }
    html.dark .tag.fiction    { background: #22183a; color: #9f82d4; }

    .person-quote {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 12px;
      margin: 14px 0;
      line-height: 1.7;
    }

    .person-takeaway {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .person-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .person-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--link-underline);
      padding-bottom: 1px;
      transition: color 0.1s;
    }
    .person-links a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-nav">
      <a class="back-link" href="../">&larr; Jerome Tse</a>
      <button id="dark-toggle">Dark</button>
    </div>

    <h1>Inspirations</h1>
    <p class="subtitle">People and stories that shaped how I think.</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="people">People</button>
      <button class="tab-btn" data-tab="stories">Stories</button>
    </div>

    <div id="people" class="tab-panel active"></div>
    <div id="stories" class="tab-panel"></div>
  </div>

  <script>
    const people = [
      {
        name: 'Alexis Ohanian',
        handle: 'Reddit co-founder',
        tags: ['business', 'resilience', 'writing'],
        quote: 'Without Their Permission.',
        takeaway: "His book was one of the things that pushed me to actually start. The core idea — that the internet lets anyone build something real without needing anyone's approval — hit hard at the right time. You don't need a VC, a big team, or a famous name. You just need to start.",
        image: 'https://unavatar.io/twitter/alexisohanian',
        imagePos: 'center top',
        links: [
          { label: 'withouttheirpermission.com', url: 'https://www.withouttheirpermission.com' },
        ],
      },
      {
        name: 'Pieter Levels',
        handle: '@levelsio',
        tags: ['indie', 'lifestyle', 'health', 'business'],
        quote: 'Make money, not art.',
        takeaway: "Pieter showed me that you can build profitable products solo, travel the world, stay healthy, and not burn out doing it. The balance he strikes between shipping things that work, living well, and keeping a small team is exactly the kind of life I'm optimizing for.",
        image: 'https://unavatar.io/twitter/levelsio',
        imagePos: 'center top',
        links: [
          { label: 'x.com/levelsio', url: 'https://x.com/levelsio' },
          { label: 'levels.io', url: 'https://levels.io' },
        ],
      },
      {
        name: 'Naval Ravikant',
        handle: '@naval',
        tags: ['philosophy', 'writing', 'business'],
        quote: 'Wealth is assets that earn while you sleep.',
        takeaway: "Naval's book and tweetstorms changed how I think about wealth, leverage, and self-knowledge. His ideas on specific knowledge, productizing yourself, and finding inner peace gave me a framework I keep returning to — especially during the hard years of building.",
        image: 'https://unavatar.io/twitter/naval',
        imagePos: 'center top',
        links: [
          { label: 'x.com/naval', url: 'https://x.com/naval' },
          { label: 'navalmanack.com', url: 'https://www.navalmanack.com' },
        ],
      },
    ];

    const stories = [
      {
        name: 'Superman',
        handle: 'DC Comics',
        tags: ['resilience', 'hope'],
        quote: 'You will give the people of Earth an ideal to strive towards.',
        takeaway: "Superman carries more power than almost anyone — and more struggle. Losing his world, living between two identities, never fully belonging anywhere. But he channels all of that into being a source of hope for others rather than turning inward. A reminder that strength isn't just what you can do, it's what you choose to do with it.",
        image: 'https://upload.wikimedia.org/wikipedia/en/1/1d/Action_Comics_1.jpg',
        imagePos: 'center top',
        links: [],
      },
      {
        name: 'Ryland Grace',
        handle: 'Project Hail Mary (2026) — Ryan Gosling',
        tags: ['resilience', 'science', 'fiction'],
        quote: 'How did I end up here? One decision at a time.',
        takeaway: "Grace is a regular person — a middle-school science teacher — who wakes up alone in space with no memory, tasked with saving humanity. What gets me is his approach: no drama, just iterate. Observe, hypothesize, test, adapt. He doesn't need to be a hero. He just keeps solving the next problem in front of him. That's the most honest depiction of how anything hard actually gets done.",
        image: 'https://upload.wikimedia.org/wikipedia/en/thumb/b/b5/Project_Hail_Mary_film_poster.jpg/220px-Project_Hail_Mary_film_poster.jpg',
        imagePos: 'center top',
        links: [
          { label: 'Project Hail Mary (film)', url: 'https://en.wikipedia.org/wiki/Project_Hail_Mary_(film)' },
        ],
      },
    ];

    const tagClasses = [
      'lifestyle','business','philosophy','health','writing',
      'indie','resilience','hope','science','fiction',
    ].reduce((acc, t) => { acc[t] = t; return acc; }, {});

    function renderCards(data, containerId) {
      document.getElementById(containerId).innerHTML = data.map(p => {
        const imgInner = p.image
          ? `<img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy" style="object-position:${p.imagePos||'center top'}" onerror="this.parentElement.innerHTML='<div class=\\'card-image-placeholder\\'>no image</div>'">`
          : `<div class="card-image-placeholder">—</div>`;
        const imgHTML = `<div class="card-image-wrap">${imgInner}</div>`;
        return `
        <div class="person-card">
          ${imgHTML}
          <div class="card-body">
            <div class="person-header">
              <div>
                <div class="person-name">${p.name}</div>
                <div class="person-handle">${p.handle}</div>
              </div>
              <div class="person-tags">
                ${p.tags.map(t => `<span class="tag ${tagClasses[t] || ''}">${t}</span>`).join('')}
              </div>
            </div>
            <div class="person-quote">"${p.quote}"</div>
            <div class="person-takeaway">${p.takeaway}</div>
            ${p.links.length ? `<div class="person-links">${p.links.map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    renderCards(people, 'people');
    renderCards(stories, 'stories');

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    const toggle = document.getElementById('dark-toggle');
    const isDark = () => document.documentElement.classList.contains('dark');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      toggle.textContent = isDark() ? 'Light' : 'Dark';
    });
  </script>
</body>
</html>
